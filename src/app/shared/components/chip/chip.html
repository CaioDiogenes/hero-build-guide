<span class="chip">
  @if (icon() && !imageFailed()) {
    <img
      class="chip__icon"
      [src]="icon()"
      alt=""
      [attr.width]="iconSize()"
      [attr.height]="iconSize()"
      [style.max-width.px]="iconSize()"
      [style.max-height.px]="iconSize()"
      loading="lazy"
      decoding="async"
      (error)="onImageError()"
    />
  }

  <ng-content />
</span>
